version: "3.8"

services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: finresilience_pb
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/pb_data
      - ./pb_public:/pb_public
      - ./pb_migrations:/pb_migrations
    restart: unless-stopped
    command: ["serve", "--http=0.0.0.0:8090"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finresilience_backend
    ports:
      - "8000:8000"
    environment:
      - POCKETBASE_URL=http://pocketbase:8090
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ENVIRONMENT=production
    depends_on:
      - pocketbase
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finresilience_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
