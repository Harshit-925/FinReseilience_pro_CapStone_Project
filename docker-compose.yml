services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:0.23.0
    container_name: finresilience_pb
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/pb_data
      - ./pb_public:/pb_public
      - ./pb_migrations:/pb_migrations
    restart: unless-stopped
    command: ["serve", "--dir=/pb_data", "--publicDir=/pb_public", "--migrationsDir=/pb_migrations", "--http=0.0.0.0:8090"]

  agent-server:
    build:
      context: ./backend
      dockerfile: Dockerfile.agent
    container_name: finresilience_agent
    ports:
      - "9000:9000"   # MCP Server (SSE transport) — 4 financial math tools
      - "9001:9001"   # Agent API — ADK Runner endpoint
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - POCKETBASE_URL=http://pocketbase:8090
      - MCP_SERVER_URL=http://localhost:9000/sse
      - ENVIRONMENT=production
    depends_on:
      - pocketbase
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finresilience_backend
    ports:
      - "8000:8000"
    environment:
      - POCKETBASE_URL=http://pocketbase:8090
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AGENT_SERVER_URL=http://agent-server:9001
      - ENVIRONMENT=production
    depends_on:
      - pocketbase
      - agent-server
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finresilience_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
